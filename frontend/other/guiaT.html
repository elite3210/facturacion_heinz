<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Guías de Remisión</title>
    <!-- Precargar scripts externos -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/stylesFactura.css">
</head>
<body>
    <!-- Contenedor principal -->
    <div class="container">
        <h1>Guías de Remisión</h1>

        <!-- Formulario de filtros -->
        <div class="filter-section">
            <form id="filter-form" class="filters">
                <div class="form-group">
                    <label for="serie">Serie/Número:</label>
                    <input type="text" id="serie" name="serie">
                </div>
                <div class="form-group">
                    <label for="fecha_desde">Fecha Desde:</label>
                    <input type="date" id="fecha_desde" name="fecha_desde">
                </div>
                <div class="form-group">
                    <label for="fecha_hasta">Fecha Hasta:</label>
                    <input type="date" id="fecha_hasta" name="fecha_hasta">
                </div>
                <div class="form-group">
                    <label for="ruc_destinatario">RUC Destinatario:</label>
                    <input type="text" id="ruc_destinatario" name="ruc_destinatario">
                </div>
                <button type="submit">Filtrar</button>
            </form>
        </div>

        <!-- Formulario de carga XML -->
        <div class="upload-section">
            <form id="upload-form" class="upload">
                <div class="form-group">
                    <label for="xml">Archivo XML:</label>
                    <input type="file" id="xml" name="xml" accept=".xml">
                </div>
                <button type="submit">Cargar XML</button>
            </form>
        </div>

        <!-- Listado de guías -->
        <div id="guias-list" class="guias-list"></div>

        <!-- Template para vista detallada -->
        <template id="guia-template">
            <div class="guia-detail">
                <!-- Datos del emisor -->
                <div class="emisor-section">
                    <h3 class="empresa-nombre"></h3>
                    <p>RUC: <span class="ruc-emisor"></span></p>
                    <p>Dirección: <span class="direccion-emisor"></span></p>
                </div>

                <!-- Datos de la guía -->
                <div class="guia-info">
                    <h4>Guía de Remisión - <span class="serie-numero"></span></h4>
                    <p>Fecha Emisión: <span class="fecha-emision"></span></p>
                    <p>Fecha Traslado: <span class="fecha-traslado"></span></p>
                    <p>Motivo: <span class="motivo-traslado"></span></p>
                </div>

                <!-- Datos del destinatario -->
                <div class="destinatario-section">
                    <h4>Destinatario</h4>
                    <p>Razón Social: <span class="cliente-nombre"></span></p>
                    <p>RUC: <span class="cliente-ruc"></span></p>
                    <p>Dirección: <span class="cliente-direccion"></span></p>
                </div>

                <!-- Detalles/Items -->
                <div class="items-section">
                    <h4>Detalles</h4>
                    <div class="items-container"></div>
                </div>

                <!-- Datos de transporte -->
                <div class="transporte-section">
                    <h4>Datos del Transporte</h4>
                    <p>Peso Bruto: <span class="peso-bruto"></span></p>
                    <p>Transportista: <span class="transportista-nombre"></span></p>
                    <p>Placa: <span class="vehiculo-placa"></span></p>
                </div>
            </div>
        </template>
    </div>

    <!-- Scripts -->
    <script type="module">
        import { GuiaRemisionAPI } from './assets/js/classes/GuiaRemisionAPI.js';
        import { GuiaRemisionList } from './assets/js/classes/GuiaRemisionList.js';

        document.addEventListener('DOMContentLoaded', function() {
            const api = new GuiaRemisionAPI();
            const container = document.getElementById('guias-list');
            const list = new GuiaRemisionList(api, container);
        });
    </script>

    <!-- Scripts de Bootstrap -->
    <script src="../assets/js/lib/bootstrap.min.js"></script>
</body>
</html>
