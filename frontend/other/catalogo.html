<script>
    let currentPage = 1;
    const totalPages = 7; // Aumentado a 7 para incluir página de cierre

    // Crear sonido de página
    let pageSound;
    try {
        // Crear un sonido sintético de página
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        function createPageTurnSound() {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(200, audioContext.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }
        
        pageSound = createPageTurnSound;
    } catch (e) {
        console.log('Audio context not available');
        pageSound = () => {};
    }

    // Datos de la empresa y productos
    const companyData = {

        email: "contacto@hogarelegante.com",

    };

    const products = [

            },
            {

                price: "S/ 459",
                icon: "🪑"
            },
            {

                price: "S/ 279",
                icon: "💡"
            },
            {
                name: "Cojines Decorativos",
                description: "Set de 4 cojines con diseños modernos y telas de alta calidad.",
                price: "S/ 89",
                icon: "🛏️"
            }
        ],
        // Página 3
        [
            {
                name: "Juego de Sábanas",

                price: "S/ 129",
                icon: "🛏️"
            },
            {

            },
            {
                name: "Espejo Decorativo",
                description: "Espejo redondo con marco dorado, perfecto para cualquier habitación.",
                price: "S/ 89",
                icon: "🪞"
            },
            {
                name: "Edredón Premium",
                description: "Edredón de plumón natural con funda de algodón egipcio.",
                price: "S/ 349",
                icon: "🛏️"
            }
        ],
        // Página 4
        [
            {
                name: "Set de Cocina",

            },

            },
            {

            },
            {

            }
        ],
        // Página 5
        [
            {
                name: "Cortinas Elegantes",
                description: "Hermosas cortinas blackout con diseño moderno, incluye barral.",
                price: "S/ 149",

            {

        [

    function renderCoverPage() {
        return `
            <div class="cover-page">
                <div class="cover-logo">HE</div>
                <h1 class="cover-title">CATÁLOGO</h1>

                    <p>${companyData.description}</p>
                    <p>📞 ${companyData.phone}</p>
                    <p>✉️ ${companyData.email}</p>
                    <p>📍 ${companyData.address}</p>
                </div>
            </div>
        `;
    }

    function renderClosingPage() {
        return `
            <div class="closing-page">
                <h1 class="closing-title">¡Gracias!</h1>
                <div class="closing-message">
                    <h3>Gracias por ver nuestro catálogo</h3>
                    <p>Esperamos que hayas encontrado productos de tu interés para transformar tu hogar en el espacio de tus sueños.</p>

                    <p>✉️ ${companyData.email}</p>
                    <p>📍 ${companyData.address}</p>
                </div>
            </div>
        `;
    }

    function renderProductsPage(pageIndex) {
        const pageProducts = products[pageIndex - 2]; // -2 porque las páginas de productos empiezan en la 2
        return `
            <div class="products-grid">
                ${pageProducts.map(product => `
                    <div class="product-card">
                        <div class="product-icon">${product.icon}</div>
                        <div class="product-name">${product.name}</div>
                        <div class="product-description">${product.description}</div>
                        <div class="product-price">${product.price}</div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function updatePage() {
        const content = document.getElementById('pageContent');
        const indicator = document.getElementById('pageIndicator');
        const prevButton = document.getElementById('prevButton');
        const nextButton = document.getElementById('nextButton');
        const header = document.getElementById('pageHeader');

        // Mostrar/ocultar header según la página
        if (currentPage === 1 || currentPage === totalPages) {
            header.classList.remove('show');
            content.classList.add('cover-height');
            content.classList.remove('full-height');
        } else {
            header.classList.add('show');
            content.classList.remove('cover-height');
            content.classList.add('full-height');
        }

        // Actualizar contenido
        if (currentPage === 1) {
            content.innerHTML = renderCoverPage();
        } else if (currentPage === totalPages) {
            content.innerHTML = renderClosingPage();
        } else {
            content.innerHTML = renderProductsPage(currentPage);
        }

        // Actualizar indicador
        indicator.textContent = `Página ${currentPage} de ${totalPages}`;

        // Actualizar botones
        prevButton.disabled = currentPage === 1;
        nextButton.disabled = currentPage === totalPages;

        // Aplicar animación basada en la dirección
        content.classList.remove('slide-in-left', 'slide-in-right');
        void content.offsetWidth; // Forzar reflow
        
        if (window.lastDirection === 'next') {
            content.classList.add('slide-in-right');
        } else if (window.lastDirection === 'prev') {
            content.classList.add('slide-in-left');
        }
    }

    function playPageSound() {
        try {
            if (pageSound) {
                pageSound();
            }
        } catch (e) {
            console.log('Could not play page sound');
        }
    }

    function nextPage() {
        if (currentPage < totalPages) {
            currentPage++;
            window.lastDirection = 'next';
            playPageSound();
            updatePage();
        }
    }

    function previousPage() {
        if (currentPage > 1) {
            currentPage--;
            window.lastDirection = 'prev';
            playPageSound();
            updatePage();
        }
    }

    // Inicializar la aplicación
    document.addEventListener('DOMContentLoaded', function() {
        updatePage();
    });

    // Soporte para navegación con teclado
    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === ' ') {
            e.preventDefault();
            nextPage();
        } else if (e.key === 'ArrowLeft') {
            e.preventDefault();
            previousPage();
        }
    });

    // Variables para gestos táctiles mejorados
    let startX = 0;
    let startY = 0;
    let startTime = 0;
    let isDragging = false;

    // Mejorado soporte para gestos táctiles
    document.addEventListener('touchstart', function(e) {
        startX = e.changedTouches[0].clientX;
        startY = e.changedTouches[0].clientY;
        startTime = Date.now();
        isDragging = false;
    }, { passive: true });

    document.addEventListener('touchmove', function(e) {
        if (!isDragging) {
            const deltaX = Math.abs(e.changedTouches[0].clientX - startX);
            const deltaY = Math.abs(e.changedTouches[0].clientY - startY);
            
            // Solo considerar como drag si el movimiento horizontal es mayor que el vertical
            if (deltaX > deltaY && deltaX > 10) {
                isDragging = true;
                e.preventDefault(); // Prevenir scroll solo cuando se detecta drag horizontal
            }
        } else {
            e.preventDefault(); // Continuar previniendo scroll durante el drag
        }
    }, { passive: false });

    document.addEventListener('touchend', function(e) {
        if (isDragging) {
            const endX = e.changedTouches[0].clientX;
            const endTime = Date.now();
            const deltaTime = endTime - startTime;
            const deltaX = startX - endX;
            
            // Verificar que sea un swipe válido (no muy lento, distancia mínima)
            if (deltaTime < 500 && Math.abs(deltaX) > 50) {
                if (deltaX > 0) {
                    // Swipe hacia la izquierda - página siguiente
                    nextPage();
                } else {
                    // Swipe hacia la derecha - página anterior
                    previousPage();
                }
            }
        }
        isDragging = false;
    }, { passive: true });

    // Prevenir zoom en doble tap
    document.addEventListener('touchend', function(e) {
        e.preventDefault();
    }, { passive: false });

    // Optimización para dispositivos móviles
    document.addEventListener('gesturestart', function(e) {
        e.preventDefault();
    });

    document.addEventListener('gesturechange', function(e) {
        e.preventDefault();
    });

    document.addEventListener('gestureend', function(e) {
        e.preventDefault();
    });
</script><!DOCTYPE html>
<html lang="es">
<head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
<style>

    }

    @media (max-width: 768px) {
        .container {
            width: 100vw;
            height: calc(100vw * 1.414);
            max-height: 95vh;
            border-radius: 0;
        }
        
        body {
            padding: 0;
        }
    }

    .header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 30px;
        text-align: center;
        position: relative;
        display: none;
    }

    .header.show {
        display: block;
    }

    .logo {

        height: 60px;

    .closing-contact p {

        font-weight: 500;
    }
    /* Navegación */
    .navigation {
        padding: 20px 40px;
        background: rgba(255, 255, 255, 0.95);
        display: flex;
        justify-content: space-between;

    .nav-button {
        background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%);

    .nav-button:hover {

    .page-indicator {

    /* Animaciones */
    @keyframes slideInDown {

        .closing-title {
            font-size: 2.5rem;
        }
        
        .closing-message {
            padding: 25px;
        }
    }
</style>
</head>

</div>

<script>

        phone: "+51 999 888 777",
        email: "contacto@hogarelegante.com",
        address: "Av. Principal 123, Lima, Perú"
    };

    const products = [
        // Página 2
        [
            {

    function renderCoverPage() {
        return `
            <div class="cover-page">
                <div class="cover-logo">HE</div>
                <h1 class="cover-title">CATÁLOGO</h1>
                <div class="company-info">
                    <h3>${companyData.name}</h3>
                    <p>${companyData.description}</p>
                    <p>📞 ${companyData.phone}</p>
                    <p>✉️ ${companyData.email}</p>
                    <p>📍 ${companyData.address}</p>
                </div>
            </div>
        `;
    }

    function renderProductsPage(pageIndex) {
        const pageProducts = products[pageIndex - 2]; // -2 porque las páginas de productos empiezan en la 2
        return `
            <div class="products-grid">
                ${pageProducts.map(product => `
                    <div class="product-card">
                        <div class="product-icon">${product.icon}</div>
                        <div class="product-name">${product.name}</div>
                        <div class="product-description">${product.description}</div>
                        <div class="product-price">${product.price}</div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function updatePage() {
        const content = document.getElementById('pageContent');
        const indicator = document.getElementById('pageIndicator');
        const prevButton = document.getElementById('prevButton');
        const nextButton = document.getElementById('nextButton');

        // Actualizar contenido
        if (currentPage === 1) {
            content.innerHTML = renderCoverPage();
        } else {
            content.innerHTML = renderProductsPage(currentPage);
        }

        // Actualizar indicador
        indicator.textContent = `Página ${currentPage} de ${totalPages}`;

        // Actualizar botones
        prevButton.disabled = currentPage === 1;
        nextButton.disabled = currentPage === totalPages;

        // Aplicar animación basada en la dirección
        content.classList.remove('slide-in-left', 'slide-in-right');
        void content.offsetWidth; // Forzar reflow
        
        if (window.lastDirection === 'next') {
            content.classList.add('slide-in-right');
        } else if (window.lastDirection === 'prev') {
            content.classList.add('slide-in-left');
        }
    }

    function nextPage() {
        if (currentPage < totalPages) {
            currentPage++;
            window.lastDirection = 'next';
            updatePage();
        }
    }

    function previousPage() {
        if (currentPage > 1) {
            currentPage--;
            window.lastDirection = 'prev';
            updatePage();
        }
    }

    // Inicializar la aplicación
    document.addEventListener('DOMContentLoaded', function() {
        updatePage();
    });

    // Soporte para navegación con teclado
    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === ' ') {
            e.preventDefault();
            nextPage();
        } else if (e.key === 'ArrowLeft') {
            e.preventDefault();
            previousPage();
        }
    });

    // Soporte para gestos táctiles básicos
    let startX = 0;
    let endX = 0;

    document.addEventListener('touchstart', function(e) {
        startX = e.changedTouches[0].screenX;
    });

    document.addEventListener('touchend', function(e) {
        endX = e.changedTouches[0].screenX;
        handleSwipe();
    });

    function handleSwipe() {
        const threshold = 50;
        const difference = startX - endX;
        
        if (Math.abs(difference) > threshold) {
            if (difference > 0) {
                // Swipe left - next page
                nextPage();
            } else {
                // Swipe right - previous page
                previousPage();
            }
        }
    }
</script>
